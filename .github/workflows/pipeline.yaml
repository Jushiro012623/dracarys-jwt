name: Ci Pipeline

on:
  push:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: openssl, mbstring, intl

      - name: Generate keys
        run: |
          mkdir -p tests/keys
          openssl genpkey -algorithm RSA -out tests/keys/private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -pubout -in tests/keys/private.pem -out tests/keys/public.pem

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test